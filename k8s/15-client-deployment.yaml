apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: ecf4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ecf4-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
